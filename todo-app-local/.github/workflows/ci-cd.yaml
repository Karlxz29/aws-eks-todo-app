name: CI/CD Pipeline for Todo App to EKS

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    # 1️⃣ Build Docker Image
    - name: Build Docker image
      run: |
        docker build -t khoanguyen2903/todo-app:${{ github.sha }} .

    # 2️⃣ Login Docker Hub
    - name: Login to Docker Hub
      run: |
        echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u khoanguyen2903 --password-stdin

    # 3️⃣ Push Image
    - name: Push Docker image
      run: |
        docker push khoanguyen2903/todo-app:${{ github.sha }}

    # 4️⃣ Configure AWS credentials
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ap-southeast-1

    # 5️⃣ Update kubeconfig
    - name: Update kubectl config for EKS
      run: |
        aws eks update-kubeconfig --name todo-cluster --region ap-southeast-1

    # 6️⃣ Deploy to EKS
    - name: Deploy to EKS
      run: |
        kubectl set image deployment/todo-deployment todo=khoanguyen2903/todo-app:${{ github.sha }}
        kubectl rollout status deployment/todo-deployment
